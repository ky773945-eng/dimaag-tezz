<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>✅ True or False · दिमाग तेज़ करो</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Baloo+2:wght@400;600;800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 14px;max-width:500px;margin:0 auto;}
.tf-btn{padding:24px 10px;border:none;border-radius:18px;font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;cursor:pointer;transition:all .2s;letter-spacing:1px;}
.tf-btn.true-btn{background:rgba(0,230,118,.15);border:2px solid var(--c5);color:var(--c5);}
.tf-btn.false-btn{background:rgba(255,23,68,.1);border:2px solid var(--c6);color:var(--c6);}
.tf-btn.correct{transform:scale(1.05);box-shadow:0 0 25px currentColor;}
.tf-btn.wrong{opacity:.5;}
.statement-text{font-size:1.05rem;line-height:1.7;font-weight:600;}
.statement-text small{display:block;font-size:.75rem;color:var(--muted);margin-top:4px;font-family:'Rajdhani',sans-serif;}
</style>
</head>
<body>
<canvas id="bgc"></canvas><canvas id="fxc"></canvas>
<div class="flash" id="fl"></div>
<div class="app">
  <div class="game-top">
    <button class="back-btn" onclick="confirmQuit()">✕</button>
    <div class="game-top-center">
      <div class="game-top-title" style="color:var(--c5)">✅ TRUE OR FALSE</div>
      <div class="game-top-sub" id="gt-sub">Level 1 · Task 1/10</div>
    </div>
    <div class="game-top-score" id="gt-score">0</div>
  </div>
  <div class="hud">
    <div class="hp"><div class="hp-val" style="color:var(--c1)" id="g-score">0</div><div class="hp-lbl">Score</div></div>
    <div class="hp"><div class="hp-val" style="color:var(--c2)" id="g-task">1/10</div><div class="hp-lbl">Task</div></div>
    <div class="hp"><div class="hp-val" style="color:var(--c3)" id="g-combo">x1</div><div class="hp-lbl">Combo</div></div>
    <div class="hp"><div class="hp-val" style="color:var(--c5)" id="g-lives">❤️❤️❤️</div><div class="hp-lbl">Lives</div></div>
  </div>
  <div class="task-prog"><div class="task-dots" id="task-dots"></div></div>
  <div class="tmr-wrap"><div class="tmr-track"><div class="tmr-fill" id="tmr-fill" style="width:100%"></div></div></div>
  <div class="q-area" id="q-area"></div>
</div>
<div class="overlay-screen" id="s-lvl-done">
  <div class="ld-card"><span class="ld-emoji" id="ld-emoji">🏆</span><div class="stars-row" id="ld-stars">⭐⭐⭐</div><div class="ld-title" id="ld-title">Level Complete!</div><div class="ld-stats" id="ld-stats"></div><div class="ld-btns"><button class="ld-btn p" id="ld-next-btn">Next Level →</button><a class="ld-btn s" href="levels.html?game=truefalse">📋 Levels</a></div></div>
</div>
<div class="overlay-screen" id="s-lvl-fail">
  <div class="lf-card"><div style="font-size:3.5rem;margin-bottom:10px">💔</div><div class="lf-title" id="lf-title">Level Failed!</div><div class="lf-sub" id="lf-sub">Phir se koshish karo!</div><div style="background:rgba(255,255,255,.04);border-radius:12px;padding:14px;margin:14px 0;font-family:'Rajdhani',sans-serif;font-size:.9rem;color:var(--muted)" id="lf-stats"></div><div class="lf-btns"><button class="lf-btn retry" onclick="retryLevel()">🔄 Retry Level</button><a class="lf-btn home" href="levels.html?game=truefalse">📋 Levels</a></div></div>
</div>
<script src="engine.js"></script>

  {hi:'मछली पानी में साँस लेती है।',en:'Fish breathe in water.',ans:true,explain:'हाँ, मछली गलफड़ों से पानी में ऑक्सीजन लेती है',zone:1},

  {hi:'मानव शरीर का सबसे बड़ा अंग त्वचा है।',en:'The largest organ of human body is the skin.',ans:true,explain:'हाँ, त्वचा (skin) सबसे बड़ा अंग है',zone:3},
  {hi:'Computer में 1 byte = 8 bits होते हैं।',en:'In computers, 1 byte = 8 bits.',ans:true,explain:'हाँ, यह standard है',zone:3},

  {hi:'RNA में Thymine की जगह Uracil होता है।',en:'RNA has Uracil instead of Thymine.',ans:true,explain:'हाँ, DNA में T है, RNA में U',zone:4},
  {hi:'Special Relativity में, E=mc² में c ध्वनि की गति है।',en:'In Special Relativity E=mc², c is the speed of sound.',ans:false,explain:'नहीं! c प्रकाश की गति है (3×10⁸ m/s)',zone:4},
  {hi:'Graph theory में Euler path सभी edges को exactly एक बार traverse करता है।',en:'Euler path traverses every edge exactly once.',ans:true,explain:'हाँ, यही Eulerian path की definition है',zone:4},
  {hi:'Black hole से light भी escape नहीं कर सकती।',en:'Not even light can escape a black hole.',ans:true,explain:'हाँ, event horizon के अंदर escape velocity > c',zone:4},
  {hi:'Mitochondria cell का "powerhouse" है।',en:'Mitochondria is the powerhouse of the cell.',ans:true,explain:'हाँ, यहाँ ATP (energy) बनती है',zone:4},

  {hi:'Standard Model में gravity को include किया गया है।',en:'The Standard Model of particle physics includes gravity.',ans:false,explain:'नहीं! Gravity Standard Model के बाहर है',zone:5},
  {hi:'P ⊆ NP होना mathematically proven है।',en:'It is proven that P is a subset of NP.',ans:true,explain:'हाँ, P⊆NP proven है, लेकिन P=NP या P≠NP unknown है',zone:5},
  {hi:'CRISPR-Cas9 DNA को edit करने की technology है।',en:'CRISPR-Cas9 is a DNA editing technology.',ans:true,explain:'हाँ, यह gene editing tool है',zone:5},
  {hi:'Navier-Stokes equations fluid dynamics describe करती हैं और पूरी तरह solved हैं।',en:'Navier-Stokes equations describe fluid dynamics and are completely solved.',ans:false,explain:'नहीं! Navier-Stokes existence and smoothness एक Millennium Problem है',zone:5},
];

function getPool(zone){return TF_BANK.filter(r=>r.zone===zone);}
function genTask(lv,ti){
  const d=getDiff(lv);
  const pool=getPool(d.zone);
  const idx=(lv*7+ti*4)%pool.length;
  const q=pool[idx];
  return{...q,time:Math.round(15*d.timeScale)};
}
function genTasks(lv){return Array.from({length:10},(_,i)=>genTask(lv,i));}

function loadTask(){
  clearTmr();CG.answered=false;
  const task=CG.tasks[CG.task];
  updSubtitle();document.getElementById('g-combo').textContent='x'+CG.combo;document.getElementById('g-task').textContent=`${CG.task+1}/10`;updLives();
  for(let i=0;i<10;i++){if(!CG.taskResults[i])document.getElementById('td'+i).className='tdot'+(i===CG.task?' cur':'');}
  const qa=document.getElementById('q-area');qa.innerHTML='';
  const card=document.createElement('div');card.className='q-card';
  card.innerHTML=`<div class="q-main" style="margin-bottom:0"><div class="statement-text">${task.hi}<small>${task.en}</small></div></div>`;qa.appendChild(card);
  const btns=document.createElement('div');btns.className='tf-btns';btns.style.marginTop='12px';
  const tBtn=document.createElement('button');tBtn.className='tf-btn true-btn';tBtn.textContent='✅ TRUE / सही';
  const fBtn=document.createElement('button');fBtn.className='tf-btn false-btn';fBtn.textContent='❌ FALSE / गलत';
  function answer(val){
    if(CG.answered)return;
    const ok=(val===task.ans);
    tBtn.disabled=true;fBtn.disabled=true;
    if(val===true){tBtn.className='tf-btn true-btn '+(ok?'correct':'wrong');}
    else{fBtn.className='tf-btn false-btn '+(ok?'correct':'wrong');}
    if(!ok){val===true?fBtn.className='tf-btn false-btn correct':tBtn.className='tf-btn true-btn correct';}
    checkAnswer(ok,null,task.ans?'TRUE':'FALSE',ok?task.explain:`Galat! ${task.explain}`,nextTask);
  }
  tBtn.onclick=()=>answer(true);fBtn.onclick=()=>answer(false);
  btns.appendChild(tBtn);btns.appendChild(fBtn);qa.appendChild(btns);
  qa.appendChild(buildFbNext(nextTask));
  startTmr(task.time,()=>timeUp(task.ans?'TRUE':'FALSE',nextTask));
}
function nextTask(){CG.task++;if(CG.task>=10){levelComplete();return;}loadTask();}
const level=parseInt(getQueryParam('level'))||1;
initGameState('truefalse',level);CG.tasks=genTasks(level);buildTaskDots();loadTask();
</script>
</body>
</html>
