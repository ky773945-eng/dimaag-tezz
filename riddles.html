<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🧩 Riddles · दिमाग तेज़ करो</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Baloo+2:wght@400;600;800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.type-input-wrap{display:flex;gap:8px;margin-bottom:8px;}
.type-input{flex:1;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:14px;font-family:'Baloo 2',cursive;font-size:1.1rem;color:var(--text);text-align:center;}
.type-input:focus{outline:none;border-color:var(--c4);}
.type-submit{background:linear-gradient(135deg,var(--c4),#7b1fa2);border:none;border-radius:12px;padding:14px 22px;font-family:'Orbitron',sans-serif;font-weight:700;color:#fff;cursor:pointer;font-size:.9rem;}
.riddle-text{font-size:1rem;line-height:1.7;color:var(--text);}
.riddle-text small{display:block;font-size:.75rem;color:var(--muted);font-family:'Rajdhani',sans-serif;margin-top:6px;}
</style>
</head>
<body>
<canvas id="bgc"></canvas><canvas id="fxc"></canvas>
<div class="flash" id="fl"></div>
<div class="app">
  <div class="game-top">
    <button class="back-btn" onclick="confirmQuit()">✕</button>
    <div class="game-top-center">
      <div class="game-top-title" style="color:var(--c4)">🧩 RIDDLES</div>
      <div class="game-top-sub" id="gt-sub">Level 1 · Task 1/10</div>
    </div>
    <div class="game-top-score" id="gt-score">0</div>
  </div>
  <div class="hud">
    <div class="hp"><div class="hp-val" style="color:var(--c1)" id="g-score">0</div><div class="hp-lbl">Score</div></div>
    <div class="hp"><div class="hp-val" style="color:var(--c2)" id="g-task">1/10</div><div class="hp-lbl">Task</div></div>
    <div class="hp"><div class="hp-val" style="color:var(--c3)" id="g-combo">x1</div><div class="hp-lbl">Combo</div></div>
    <div class="hp"><div class="hp-val" style="color:var(--c5)" id="g-lives">❤️❤️❤️</div><div class="hp-lbl">Lives</div></div>
  </div>
  <div class="task-prog"><div class="task-dots" id="task-dots"></div></div>
  <div class="tmr-wrap"><div class="tmr-track"><div class="tmr-fill" id="tmr-fill" style="width:100%"></div></div></div>
  <div class="q-area" id="q-area"></div>
</div>

<div class="overlay-screen" id="s-lvl-done">
  <div class="ld-card">
    <span class="ld-emoji" id="ld-emoji">🏆</span>
    <div class="stars-row" id="ld-stars">⭐⭐⭐</div>
    <div class="ld-title" id="ld-title">Level Complete!</div>
    <div class="ld-stats" id="ld-stats"></div>
    <div class="ld-btns">
      <button class="ld-btn p" id="ld-next-btn">Next Level →</button>
      <a class="ld-btn s" href="levels.html?game=riddles">📋 Levels</a>
    </div>
  </div>
</div>

<div class="overlay-screen" id="s-lvl-fail">
  <div class="lf-card">
    <div style="font-size:3.5rem;margin-bottom:10px">💔</div>
    <div class="lf-title" id="lf-title">Level Failed!</div>
    <div class="lf-sub" id="lf-sub">Phir se koshish karo!</div>
    <div style="background:rgba(255,255,255,.04);border-radius:12px;padding:14px;margin:14px 0;font-family:'Rajdhani',sans-serif;font-size:.9rem;color:var(--muted)" id="lf-stats"></div>
    <div class="lf-btns">
      <button class="lf-btn retry" onclick="retryLevel()">🔄 Retry Level</button>
      <a class="lf-btn home" href="levels.html?game=riddles">📋 Levels</a>
    </div>
  </div>
</div>

<script src="engine.js"></script>
<script>
// ===== RIDDLES BANK =====
// Each riddle: hi/en text, type: 'mcq' or 'type', ans, opts(for mcq), hint, diffLevel (1-5 matching zones)
const RIDDLE_BANK=[
  // ===== ZONE 1 (Easy, Level 1-20) - Simple logic & word riddles =====
  {hi:'एक आदमी के पास 6 भेड़ें हैं, सभी मर गईं सिवाय 4 के। कितनी भेड़ें बची?',en:'A man has 6 sheep, all but 4 died. How many are left?',type:'type',ans:'4',hint:'"सिवाय 4 के" को ध्यान से पढ़ो',zone:1},
  {hi:'सुबह 4 पाँव, दोपहर 2 पाँव, शाम 3 पाँव — यह क्या है?',en:'4 legs in morning, 2 in afternoon, 3 in evening?',type:'mcq',ans:'इंसान',opts:['इंसान','कुर्सी','कुत्ता','घोड़ा'],hint:'बचपन-जवानी-बुढ़ापा',zone:1},
  {hi:'अगर 2 संतरे 6 रुपये के हैं, तो 1 दर्जन संतरे का दाम क्या होगा?',en:'If 2 oranges cost ₹6, what is the cost of 1 dozen?',type:'type',ans:'36',hint:'1 संतरा = 3 रुपये, दर्जन = 12',zone:1},
  {hi:'मेरे पास कोई आवाज़ नहीं, फिर भी मैं बोलता हूँ। मैं क्या हूँ?',en:'I speak without a mouth. What am I?',type:'mcq',ans:'गूँज',opts:['गूँज','किताब','रेडियो','हवा'],hint:'पहाड़ों में सुनाई देती है',zone:1},
  {hi:'राम की उम्र श्याम से दुगुनी है। 5 साल बाद राम की उम्र श्याम से 1.5 गुना होगी। श्याम की अभी उम्र क्या है?',en:'Ram is twice as old as Shyam. After 5 years Ram will be 1.5x. Find Shyam\'s age now.',type:'type',ans:'10',hint:'समीकरण बनाओ: 2x+5=1.5(x+5)',zone:1},
  {hi:'एक टोकरी में 5 सेब हैं। 5 बच्चों को एक-एक सेब दो, फिर भी टोकरी में 1 सेब बचे। कैसे?',en:'5 apples, give each of 5 kids one apple, basket still has 1 apple left. How?',type:'mcq',ans:'आख़िरी बच्चे को टोकरी के साथ सेब दिया',opts:['आख़िरी बच्चे को टोकरी के साथ सेब दिया','एक सेब छोटा था','गलत गिनती','कोई नहीं खाया'],hint:'टोकरी समेत दे दो',zone:1},
  {hi:'क्या भारी है — 1 किलो रुई या 1 किलो लोहा?',en:'What is heavier — 1kg cotton or 1kg iron?',type:'mcq',ans:'दोनों बराबर',opts:['रुई','लोहा','दोनों बराबर','पता नहीं'],hint:'वज़न का यूनिट एक जैसा है',zone:1},
  {hi:'मेरे पास शहर हैं पर घर नहीं, जंगल हैं पर पेड़ नहीं, पानी है पर मछली नहीं। मैं क्या हूँ?',en:'I have cities, no houses; forests, no trees; water, no fish.',type:'mcq',ans:'नक्शा (Map)',opts:['नक्शा (Map)','फ़ोटो','किताब','टीवी'],hint:'इसे देखकर रास्ता ढूंढते हैं',zone:1},
  {hi:'अगर आज सोमवार है, तो 100 दिन बाद कौन सा दिन होगा?',en:'If today is Monday, what day will it be after 100 days?',type:'mcq',ans:'बुधवार',opts:['मंगलवार','बुधवार','गुरुवार','शुक्रवार'],hint:'100 ÷ 7 = 14 हफ़्ते + 2 दिन',zone:1},
  {hi:'एक थैले में 3 लाल और 2 नीली गेंदें हैं। बिना देखे 2 गेंदें निकालो ताकि दोनों एक रंग की हों — कम से कम कितनी बार निकालनी होंगी पक्का होने के लिए?',en:'Bag has 3 red, 2 blue balls. Minimum draws to guarantee 2 same color?',type:'type',ans:'3',hint:'Pigeonhole principle',zone:1},

  // ===== ZONE 2 (Normal, Level 21-40) =====
  {hi:'एक नदी के किनारे 3 चोर और 3 पुलिस वाले हैं। एक नाव में सिर्फ 2 लोग बैठ सकते हैं। अगर किसी किनारे पर चोर पुलिस से ज़्यादा हो गए तो चोर पुलिस को मार देंगे। सबको नदी पार करना है। कम से कम कितनी बार नाव चलानी होगी?',en:'3 thieves, 3 police at a river. Boat holds 2. Thieves can\'t outnumber police on either side. Minimum boat trips?',type:'type',ans:'11',hint:'हर trip में संतुलन बनाना ज़रूरी है',zone:2},
  {hi:'एक आदमी के पास भेड़िया, भेड़ और घास है। नाव में सिर्फ वो और एक चीज़ जा सकती है। भेड़िया भेड़ को खा जाएगा, भेड़ घास खा जाएगी (अगर अकेले छोड़े)। सबको पार कैसे ले जाए?',en:'Man has wolf, sheep, grass. Boat carries him + 1 item. Wolf eats sheep, sheep eats grass if left alone.',type:'mcq',ans:'पहले भेड़ ले जाओ, वापस आओ, भेड़िया ले जाओ-भेड़ वापस लाओ, घास ले जाओ, वापस आओ-भेड़ ले जाओ',opts:['पहले भेड़ ले जाओ, वापस आओ, भेड़िया ले जाओ-भेड़ वापस लाओ, घास ले जाओ, वापस आओ-भेड़ ले जाओ','पहले भेड़िया ले जाओ','पहले घास ले जाओ और वापस मत आओ','तीनों एक साथ ले जाओ'],hint:'भेड़ को बीच में बार-बार लाना होगा',zone:2},
  {hi:'5 आदमी एक कमरे में हैं। हर एक दूसरे से हाथ मिलाता है। कुल कितने हाथ मिलाने होंगे?',en:'5 men in a room, each shakes hands with every other once. Total handshakes?',type:'type',ans:'10',hint:'n(n-1)/2 = 5×4/2',zone:2},
  {hi:'एक घड़ी में 3 बजे हैं। घंटे और मिनट की सुई के बीच कितने डिग्री का कोण है?',en:'Clock shows 3:00. What is the angle between hour and minute hands?',type:'type',ans:'90',hint:'3 बजे की स्थिति याद करो',zone:2},
  {hi:'दो पिता और दो बेटे मिलकर 3 सेब बांट रहे हैं, हर एक को पूरा सेब मिलता है। कैसे?',en:'2 fathers and 2 sons share 3 apples equally, each getting a whole apple. How?',type:'mcq',ans:'दादा, बेटा (जो पिता भी है), और पोता — सिर्फ 3 लोग',opts:['दादा, बेटा (जो पिता भी है), और पोता — सिर्फ 3 लोग','सेब आधे बांटे गए','एक झूठ बोल रहा था','असंभव है'],hint:'3 पीढ़ियाँ लेकिन सिर्फ 3 लोग',zone:2},
  {hi:'एक कमरे में बिल्ली है। 4 कोनों में 1-1 बिल्ली बैठी है, हर बिल्ली के सामने 3 बिल्लियां हैं। कुल कितनी बिल्लियां हैं?',en:'4 cats in 4 corners, each sees 3 cats in front. Total cats?',type:'type',ans:'4',hint:'हर बिल्ली बाकी 3 को देख सकती है',zone:2},
  {hi:'अगर ट्रेन 60 किमी/घंटा से चलकर 3 घंटे में मंज़िल पहुंचती है, तो 90 किमी/घंटा से कितने घंटे में पहुंचेगी?',en:'Train travels at 60km/h reaches in 3hrs. At 90km/h, how long?',type:'type',ans:'2',hint:'दूरी = speed × time, दूरी constant रहेगी',zone:2},
  {hi:'एक आदमी हर रोज़ अपनी उम्र के बराबर रुपये बचाता है। 10 दिन में उसने 550 रुपये बचाए। उसकी शुरुआती उम्र क्या थी?',en:'Man saves money equal to his age each day, increasing daily. Saved ₹550 in 10 days. Starting age?',type:'type',ans:'50',hint:'AP sum: n/2(2a+(n-1)d), d=1',zone:2},
  {hi:'मैं हमेशा आगे जाता हूँ, कभी पीछे नहीं, मेरे बिना समय नहीं चलता। मैं क्या हूँ?',en:'I always move forward, never back, time can\'t move without me.',type:'mcq',ans:'घड़ी की सुई',opts:['घड़ी की सुई','हवा','पानी','सूरज'],hint:'12 अंकों पर घूमती है',zone:2},
  {hi:'एक संख्या को 5 से भाग दो तो 3 बचता है, 7 से भाग दो तो 5 बचता है। सबसे छोटी संख्या क्या है?',en:'A number leaves remainder 3 when divided by 5, remainder 5 when divided by 7. Smallest number?',type:'type',ans:'33',hint:'दोनों conditions check करते जाओ',zone:2},

  // ===== ZONE 3 (Hard, Level 41-60) =====
  {hi:'एक आदमी के पास 8 गेंदें हैं, एक नकली है जो हल्की या भारी हो सकती है। एक तराज़ू से सिर्फ 2 बार तौलकर नकली गेंद ढूंढो। कैसे?',en:'8 balls, 1 fake (lighter or heavier). Find it using a balance scale only 2 times.',type:'mcq',ans:'गेंदों को 3 ग्रुप (3,3,2) में बांटो और तुलना करो',opts:['गेंदों को 3 ग्रुप (3,3,2) में बांटो और तुलना करो','सभी को एक साथ तौलो','2-2 के जोड़े बनाओ','असंभव है'],hint:'Group divide करना ज़रूरी है',zone:3},
  {hi:'100 बल्ब एक लाइन में हैं, सभी बंद हैं। 100 लोग आते हैं — पहला सभी bulb का switch दबाता है, दूसरा हर दूसरे bulb का, तीसरा हर तीसरे का, इस तरह 100वां सिर्फ 100वें का। आख़िर में कितने bulb जल रहे होंगे?',en:'100 bulbs, person n toggles every nth bulb. How many bulbs ON at the end?',type:'type',ans:'10',hint:'Perfect squares (1,4,9,16...) जलेंगे',zone:3},
  {hi:'एक कमरे में 23 लोग हैं। कम से कम कितनी probability है कि 2 लोगों का birthday same हो?',en:'23 people in a room. What is approx probability that 2 share a birthday?',type:'mcq',ans:'50% से ज़्यादा',opts:['50% से ज़्यादा','10% से कम','25%','100%'],hint:'Birthday Paradox',zone:3},
  {hi:'एक दौड़ में A, B से आगे है, B, C से आगे है, D, A और C के बीच में है। चौथे नंबर पर कौन है?',en:'A is ahead of B, B ahead of C, D is between A and C. Who is 4th?',type:'mcq',ans:'C',opts:['A','B','C','D'],hint:'क्रम लिखो: A, D, B, C',zone:3},
  {hi:'एक संख्या के अंकों का योग 18 है और वह 9 से पूरी तरह विभाज्य है। यह संख्या 2 अंकों की सबसे बड़ी है। वह संख्या क्या है?',en:'A 2-digit number whose digits sum to 18 and is divisible by 9, find the largest.',type:'type',ans:'99',hint:'9+9=18, 99÷9=11',zone:3},
  {hi:'3 बक्सों में सिक्के हैं — एक में सिर्फ सोने, एक सिर्फ चांदी, एक मिक्स। लेबल सभी गलत हैं। 1 सिक्का निकालकर सही लेबल कैसे लगाओ?',en:'3 boxes labeled Gold, Silver, Mixed - all labels wrong. Find correct labels by drawing 1 coin.',type:'mcq',ans:'"Mixed" लेबल वाले बॉक्स से सिक्का निकालो',opts:['"Mixed" लेबल वाले बॉक्स से सिक्का निकालो','"Gold" लेबल वाले से निकालो','किसी से भी निकालो','3 सिक्के निकालने होंगे'],hint:'सभी लेबल गलत हैं तो "Mixed" वाला असल में pure है',zone:3},
  {hi:'एक परिवार में हर बेटी के 1 भाई हैं और हर बेटे के 2 बहनें हैं। परिवार में कुल कितने बच्चे हैं?',en:'Family where each daughter has 1 brother, each son has 2 sisters. Total children?',type:'type',ans:'3',hint:'2 बहनें + 1 भाई = 3',zone:3},
  {hi:'दो रस्सियां हैं, हर एक को जलने में पूरा 1 घंटा लगता है (असमान गति से जलती हैं)। सिर्फ इन्हें जलाकर 45 मिनट कैसे मापो?',en:'2 ropes, each burns in 1hr (unevenly). Measure exactly 45 minutes using only these.',type:'mcq',ans:'एक रस्सी दोनों सिरों से, दूसरी एक सिरे से जलाओ',opts:['एक रस्सी दोनों सिरों से, दूसरी एक सिरे से जलाओ','दोनों एक साथ एक सिरे से जलाओ','आधी रस्सी काट दो','असंभव है'],hint:'दोनों सिरों से जलाने पर समय आधा हो जाता है',zone:3},
  {hi:'एक सीढ़ी की 10 पायदान चढ़ने हैं, हर बार 1 या 2 पायदान चढ़ सकते हो। कितने तरीकों से चढ़ सकते हो?',en:'10 steps to climb, 1 or 2 steps at a time. How many ways?',type:'type',ans:'89',hint:'Fibonacci sequence',zone:3},
  {hi:'5 लोग एक गोल मेज़ पर बैठे हैं। हर एक के बाएं वाला उससे 1 साल छोटा है। सबकी उम्र का योग 175 है, सबसे बड़े की उम्र पता करो (पूरे चक्र में 1-1 साल का अंतर)।',en:'5 people round table, each is 1yr younger than person to right, ages sum 175. Find oldest age. (assume arithmetic progression breaks circular for this)',type:'type',ans:'37',hint:'औसत 35 है, फैलाव के हिसाब से adjust करो',zone:3},

  // ===== ZONE 4 (Expert, Level 61-80) =====
  {hi:'12 गेंदों में से 1 नकली है (हल्की या भारी पता नहीं)। तराज़ू से सिर्फ 3 बार तौलकर नकली गेंद और बताओ कि वो हल्की है या भारी। कैसे?',en:'12 balls, 1 fake (weight unknown lighter/heavier). Find it AND determine light/heavy in just 3 weighings.',type:'mcq',ans:'4-4-4 में divide करके systematic comparison करो',opts:['4-4-4 में divide करके systematic comparison करो','6-6 में बांटो','सभी एक साथ तौलो','2 बार तौलना काफ़ी है'],hint:'Classic 12-ball puzzle, ternary search जैसा',zone:4},

function getRiddlesForZone(zone){return RIDDLE_BANK.filter(r=>r.zone===zone);}

function genRiddleTask(lv,ti){
  const d=getDiff(lv);
  const zoneRiddles=getRiddlesForZone(d.zone);
  const idx=(lv*7+ti*3)%zoneRiddles.length;
  const r=zoneRiddles[idx];
  return{...r,time:r.type==='type'?Math.round(40*d.timeScale):Math.round(25*d.timeScale)};
}

function genTasks(lv){const t=[];for(let i=0;i<10;i++)t.push(genRiddleTask(lv,i));return t;}

function loadTask(){
  clearTmr();
  CG.answered=false;
  const task=CG.tasks[CG.task];
  updSubtitle();
  document.getElementById('g-combo').textContent='x'+CG.combo;
  document.getElementById('g-task').textContent=`${CG.task+1}/10`;
  updLives();
  for(let i=0;i<10;i++){if(!CG.taskResults[i])document.getElementById('td'+i).className='tdot'+(i===CG.task?' cur':'');}

  const qa=document.getElementById('q-area');qa.innerHTML='';
  const card=document.createElement('div');card.className='q-card';
  card.innerHTML=`<div class="riddle-text">${task.hi}<small>${task.en}</small></div>`;
  qa.appendChild(card);
  const h=document.createElement('div');h.className='hint-t';h.textContent='💡 '+task.hint;qa.appendChild(h);

  if(task.type==='mcq'){
    qa.appendChild(buildOpts(task.opts,(sel,btn)=>checkAnswer(sel===task.ans,btn,task.ans,null,nextTask)));
  }else{
    const wrap=document.createElement('div');wrap.className='type-input-wrap';
    const inp=document.createElement('input');inp.className='type-input';inp.type='text';inp.placeholder='जवाब लिखो...';inp.id='type-ans';
    const btn=document.createElement('button');btn.className='type-submit';btn.textContent='✓ Submit';
    function submit(){
      const val=inp.value.trim().toLowerCase();
      const correct=String(task.ans).trim().toLowerCase();
      checkAnswer(val===correct,null,task.ans,null,nextTask);
      inp.disabled=true;btn.disabled=true;
    }
    btn.onclick=submit;
    inp.onkeypress=(e)=>{if(e.key==='Enter')submit();};
    wrap.appendChild(inp);wrap.appendChild(btn);
    qa.appendChild(wrap);
    setTimeout(()=>inp.focus(),100);
  }
  qa.appendChild(buildFbNext(nextTask));
  startTmr(task.time,()=>timeUp(task.ans,nextTask));
}

function nextTask(){
  CG.task++;
  if(CG.task>=10){levelComplete();return;}
  loadTask();
}

const level=parseInt(getQueryParam('level'))||1;
initGameState('riddles',level);
CG.tasks=genTasks(level);
buildTaskDots();
loadTask();
</script>
