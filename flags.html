<!DOCTYPE html>

<div class="flash" id="fl"></div>

    </div>
    <div class="game-top-score" id="gt-score">0</div>
  </div>
  <div class="hud">
    <div class="hp"><div class="hp-val" style="color:var(--c1)" id="g-score">0</div><div class="hp-lbl">Score</div></div>

  </div>
  <div class="task-prog"><div class="task-dots" id="task-dots"></div></div>
  <div class="tmr-wrap"><div class="tmr-track"><div class="tmr-fill" id="tmr-fill" style="width:100%"></div></div></div>
  <div class="q-area" id="q-area"></div>
</div>
<div class="overlay-screen" id="s-lvl-done">
  <div class="ld-card"><span class="ld-emoji" id="ld-emoji">🏆</span><div class="stars-row" id="ld-stars">⭐⭐⭐</div><div class="ld-title" id="ld-title">Level Complete!</div><div class="ld-stats" id="ld-stats"></div><div class="ld-btns"><button class="ld-btn p" id="ld-next-btn">Next Level →</button><a class="ld-btn s" href="levels.html?game=flags">📋 Levels</a></div></div>
</div>
<div class="overlay-screen" id="s-lvl-fail">
  <div class="lf-card"><div style="font-size:3.5rem;margin-bottom:10px">💔</div><div class="lf-title" id="lf-title">Level Failed!</div><div class="lf-sub" id="lf-sub">Phir se koshish karo!</div><div style="background:rgba(255,255,255,.04);border-radius:12px;padding:14px;margin:14px 0;font-family:'Rajdhani',sans-serif;font-size:.9rem;color:var(--muted)" id="lf-stats"></div><div class="lf-btns"><button class="lf-btn retry" onclick="retryLevel()">🔄 Retry Level</button><a class="lf-btn home" href="levels.html?game=flags">📋 Levels</a></div></div>

function getPool(zone){return FLAGS.filter(f=>f.zone===zone);}
function genTask(lv,ti){
  const d=getDiff(lv);
  const pool=getPool(d.zone);
  const allOtherZones=FLAGS.filter(f=>f.zone<=d.zone);
  const idx=(lv*7+ti*4)%pool.length;
  const correct=pool[idx];
  const wrongs=shuffle(allOtherZones.filter(f=>f.name!==correct.name)).slice(0,3);
  return{correct,opts:shuffle([correct,...wrongs]),time:Math.round(12*d.timeScale)};
}
function genTasks(lv){return Array.from({length:10},(_,i)=>genTask(lv,i));}

function loadTask(){
  clearTmr();CG.answered=false;
  const task=CG.tasks[CG.task];
  updSubtitle();document.getElementById('g-combo').textContent='x'+CG.combo;document.getElementById('g-task').textContent=`${CG.task+1}/10`;updLives();
  for(let i=0;i<10;i++){if(!CG.taskResults[i])document.getElementById('td'+i).className='tdot'+(i===CG.task?' cur':'');}
  const qa=document.getElementById('q-area');qa.innerHTML='';
  const fd=document.createElement('div');fd.className='flag-display';fd.textContent=task.correct.flag;qa.appendChild(fd);
  const fh=document.createElement('div');fh.className='flag-hint';fh.textContent='यह किस देश का झंडा है? / Which country\'s flag?';qa.appendChild(fh);
  const og=document.createElement('div');og.className='opts-2';
  task.opts.forEach(opt=>{
    const b=document.createElement('button');b.className='opt-b';
    b.innerHTML=`${opt.flag} ${opt.nameHi}<br><small style="font-size:.7rem;color:var(--muted)">${opt.name}</small>`;
    b.onclick=()=>checkAnswer(opt.name===task.correct.name,b,task.correct.nameHi,null,nextTask);
    og.appendChild(b);
  });
  qa.appendChild(og);qa.appendChild(buildFbNext(nextTask));
  startTmr(task.time,()=>timeUp(task.correct.nameHi,nextTask));
}
function nextTask(){CG.task++;if(CG.task>=10){levelComplete();return;}loadTask();}
const level=parseInt(getQueryParam('level'))||1;
initGameState('flags',level);CG.tasks=genTasks(level);buildTaskDots();loadTask();
</script>

</html>
