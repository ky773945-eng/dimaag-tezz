<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⌨️ Speed Typing · दिमाग तेज़ करो</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Baloo+2:wght@400;600;800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.speed-area{padding:16px;max-width:500px;margin:0 auto;text-align:center;}
.big-number{font-family:'Orbitron',sans-serif;font-size:clamp(2.5rem,12vw,5rem);font-weight:900;letter-spacing:6px;padding:24px;background:var(--card);border-radius:20px;border:1px solid var(--border);margin-bottom:16px;color:var(--c3);text-shadow:0 0 20px rgba(255,215,0,.3);}
.type-row{display:flex;gap:10px;}
.type-inp{flex:1;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:14px;padding:14px;font-family:'Orbitron',sans-serif;font-size:1.4rem;color:var(--text);text-align:center;letter-spacing:4px;}
.type-inp:focus{outline:none;border-color:var(--c2);}
.type-inp.correct{border-color:var(--c5);color:var(--c5);}
.type-inp.wrong{border-color:var(--c6);color:var(--c6);}
.sub-btn{background:linear-gradient(135deg,var(--c2),#0091ea);border:none;border-radius:14px;padding:14px 20px;font-family:'Orbitron',sans-serif;font-weight:700;color:#000;cursor:pointer;font-size:.9rem;}
</style>
</head>
<body>
<canvas id="bgc"></canvas><canvas id="fxc"></canvas>
<div class="flash" id="fl"></div>
<div class="app">
  <div class="game-top">
    <button class="back-btn" onclick="confirmQuit()">✕</button>
    <div class="game-top-center">
      <div class="game-top-title" style="color:var(--c2)">⌨️ SPEED TYPING</div>
      <div class="game-top-sub" id="gt-sub">Level 1 · Task 1/10</div>
    </div>
    <div class="game-top-score" id="gt-score">0</div>
  </div>
  <div class="hud">
    <div class="hp"><div class="hp-val" style="color:var(--c1)" id="g-score">0</div><div class="hp-lbl">Score</div></div>
    <div class="hp"><div class="hp-val" style="color:var(--c2)" id="g-task">1/10</div><div class="hp-lbl">Task</div></div>
    <div class="hp"><div class="hp-val" style="color:var(--c3)" id="g-combo">x1</div><div class="hp-lbl">Combo</div></div>
    <div class="hp"><div class="hp-val" style="color:var(--c5)" id="g-lives">❤️❤️❤️</div><div class="hp-lbl">Lives</div></div>
  </div>
  <div class="task-prog"><div class="task-dots" id="task-dots"></div></div>
  <div class="tmr-wrap"><div class="tmr-track"><div class="tmr-fill" id="tmr-fill" style="width:100%"></div></div></div>
  <div class="q-area" id="q-area"></div>
</div>
<div class="overlay-screen" id="s-lvl-done">
  <div class="ld-card"><span class="ld-emoji" id="ld-emoji">🏆</span><div class="stars-row" id="ld-stars">⭐⭐⭐</div><div class="ld-title" id="ld-title">Level Complete!</div><div class="ld-stats" id="ld-stats"></div><div class="ld-btns"><button class="ld-btn p" id="ld-next-btn">Next Level →</button><a class="ld-btn s" href="levels.html?game=speed">📋 Levels</a></div></div>
</div>
<div class="overlay-screen" id="s-lvl-fail">
  <div class="lf-card"><div style="font-size:3.5rem;margin-bottom:10px">💔</div><div class="lf-title" id="lf-title">Level Failed!</div><div class="lf-sub" id="lf-sub">Phir se koshish karo!</div><div style="background:rgba(255,255,255,.04);border-radius:12px;padding:14px;margin:14px 0;font-family:'Rajdhani',sans-serif;font-size:.9rem;color:var(--muted)" id="lf-stats"></div><div class="lf-btns"><button class="lf-btn retry" onclick="retryLevel()">🔄 Retry Level</button><a class="lf-btn home" href="levels.html?game=speed">📋 Levels</a></div></div>
</div>
<script src="engine.js"></script>
<script>
function genTask(lv){
  const d=getDiff(lv);
  let digits=Math.min(2+Math.floor(lv/15),8);
  let num='';
  for(let i=0;i<digits;i++)num+=Math.floor(Math.random()*10);
  if(lv>50){// mix letters too
    const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    num='';for(let i=0;i<digits;i++)num+=chars[Math.floor(Math.random()*chars.length)];
  }
  return{target:num,time:Math.round((3+digits)*d.timeScale)};
}
function genTasks(lv){return Array.from({length:10},()=>genTask(lv));}

function loadTask(){
  clearTmr();CG.answered=false;
  const task=CG.tasks[CG.task];
  updSubtitle();document.getElementById('g-combo').textContent='x'+CG.combo;document.getElementById('g-task').textContent=`${CG.task+1}/10`;updLives();
  for(let i=0;i<10;i++){if(!CG.taskResults[i])document.getElementById('td'+i).className='tdot'+(i===CG.task?' cur':'');}
  const qa=document.getElementById('q-area');qa.innerHTML='';
  const area=document.createElement('div');area.className='speed-area';
  const lbl=document.createElement('div');lbl.style.cssText='font-family:"Rajdhani",sans-serif;font-size:.85rem;color:var(--muted);margin-bottom:10px;';lbl.textContent='जल्दी से type करो! / Type this fast!';area.appendChild(lbl);
  const big=document.createElement('div');big.className='big-number';big.textContent=task.target;area.appendChild(big);
  const row=document.createElement('div');row.className='type-row';
  const inp=document.createElement('input');inp.className='type-inp';inp.type='text';inp.maxLength=task.target.length;inp.placeholder='यहाँ type करो...';inp.autocomplete='off';inp.id='speed-inp';
  inp.oninput=()=>{
    const val=inp.value.toUpperCase();
    if(val===task.target.toUpperCase()){inp.className='type-inp correct';submit();}
    else if(task.target.toUpperCase().startsWith(val))inp.className='type-inp';
    else inp.className='type-inp wrong';
  };
  const btn=document.createElement('button');btn.className='sub-btn';btn.textContent='✓';
  function submit(){if(CG.answered)return;const val=inp.value.trim().toUpperCase();checkAnswer(val===task.target.toUpperCase(),null,task.target,null,nextTask);inp.disabled=true;btn.disabled=true;}
  btn.onclick=submit;inp.onkeypress=(e)=>{if(e.key==='Enter')submit();};
  row.appendChild(inp);row.appendChild(btn);area.appendChild(row);
  qa.appendChild(area);qa.appendChild(buildFbNext(nextTask));
  startTmr(task.time,()=>timeUp(task.target,nextTask));
  setTimeout(()=>inp.focus(),100);
}
function nextTask(){CG.task++;if(CG.task>=10){levelComplete();return;}loadTask();}
const level=parseInt(getQueryParam('level'))||1;
initGameState('speed',level);CG.tasks=genTasks(level);buildTaskDots();loadTask();
</script>
</body>
</html>
