<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 दिमाग तेज़ करो · PREMIUM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Baloo+2:wght@400;600;800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050510;
  --card: rgba(15,15,40,0.85);
  --border: rgba(255,255,255,0.08);
  --accent1: #ff6b35;
  --accent2: #00e5ff;
  --accent3: #ffd700;
  --accent4: #bf5fff;
  --correct: #00e676;
  --wrong: #ff1744;
  --text: #f0f0ff;
  --muted: #6060a0;
  --glass: rgba(255,255,255,0.04);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Baloo 2', cursive;
  min-height: 100vh;
  overflow-x: hidden;
  cursor: none;
}

/* Custom cursor */
.cursor {
  width: 18px; height: 18px;
  border: 2px solid var(--accent2);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.15s, border-color 0.2s;
  mix-blend-mode: difference;
}
.cursor-dot {
  width: 5px; height: 5px;
  background: var(--accent2);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transition: none;
}

/* Starfield canvas */
#starfield {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* Particle canvas */
#particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
}

/* All content above canvas */
.app { position: relative; z-index: 2; }

/* ===== INTRO SCREEN ===== */
#intro-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px;
}

.intro-glow {
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(0,229,255,0.12) 0%, transparent 70%);
  border-radius: 50%;
  animation: introGlow 3s ease-in-out infinite alternate;
}

@keyframes introGlow {
  0% { transform: scale(0.8); opacity: 0.5; }
  100% { transform: scale(1.2); opacity: 1; }
}

.intro-brain {
  font-size: 5rem;
  animation: brainFloat 2s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 30px var(--accent2));
  margin-bottom: 16px;
}

@keyframes brainFloat {
  0% { transform: translateY(0) scale(1); }
  100% { transform: translateY(-12px) scale(1.05); }
}

.intro-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.8rem, 6vw, 3.5rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent2), var(--accent3), var(--accent1));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.intro-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem;
  color: var(--muted);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 30px;
}

.intro-features {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 36px;
}

.feat-chip {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50px;
  padding: 6px 16px;
  font-size: 0.8rem;
  color: var(--accent2);
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 1px;
  animation: chipFade 0.5s ease both;
}

.feat-chip:nth-child(1) { animation-delay: 0.3s; }
.feat-chip:nth-child(2) { animation-delay: 0.5s; }
.feat-chip:nth-child(3) { animation-delay: 0.7s; }
.feat-chip:nth-child(4) { animation-delay: 0.9s; }

@keyframes chipFade { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

.play-btn {
  position: relative;
  padding: 18px 60px;
  background: transparent;
  border: 2px solid var(--accent2);
  border-radius: 50px;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--accent2);
  cursor: pointer;
  letter-spacing: 3px;
  text-transform: uppercase;
  overflow: hidden;
  transition: all 0.3s;
  animation: chipFade 0.5s 1.1s ease both;
}

.play-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent2);
  transform: translateX(-101%);
  transition: transform 0.3s ease;
  z-index: -1;
}

.play-btn:hover {
  color: #000;
  box-shadow: 0 0 40px rgba(0,229,255,0.5);
}

.play-btn:hover::before { transform: translateX(0); }

/* ===== MAIN GAME ===== */
.main-game { display: none; padding: 0 0 40px; }
.main-game.show { display: block; }

/* Header */
.game-header {
  background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
  padding: 20px 20px 0;
  text-align: center;
}

.game-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  background: linear-gradient(90deg, var(--accent2), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 3px;
}

/* HUD */
.hud {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 14px 16px;
  max-width: 600px;
  margin: 0 auto;
}

.hud-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 8px;
  text-align: center;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}

.hud-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--hud-color, var(--accent2));
  opacity: 0.8;
}

.hud-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 1px;
  color: var(--muted);
  text-transform: uppercase;
  display: block;
}

.hud-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--hud-color, var(--accent2));
  display: block;
  line-height: 1.2;
}

/* Streak */
.streak-bar {
  max-width: 600px;
  margin: 0 auto 10px;
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.streak-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.75rem;
  color: var(--muted);
  white-space: nowrap;
  letter-spacing: 1px;
}

.streak-dots {
  display: flex;
  gap: 5px;
  flex: 1;
}

.streak-dot {
  flex: 1;
  height: 8px;
  border-radius: 4px;
  background: rgba(255,255,255,0.06);
  transition: all 0.3s;
  max-width: 28px;
}

.streak-dot.lit {
  background: linear-gradient(90deg, var(--accent3), var(--accent1));
  box-shadow: 0 0 8px rgba(255,215,0,0.5);
  animation: streakPop 0.3s ease;
}

@keyframes streakPop { 0%{transform:scaleY(0.5)} 60%{transform:scaleY(1.4)} 100%{transform:scaleY(1)} }

.streak-fire {
  font-size: 1.2rem;
  animation: firePulse 0.5s ease infinite alternate;
  opacity: 0;
  transition: opacity 0.3s;
}

.streak-fire.show { opacity: 1; }

@keyframes firePulse { 0%{transform:scale(1)} 100%{transform:scale(1.2)} }

/* Combo popup */
.combo-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  z-index: 50;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2rem, 8vw, 4rem);
  font-weight: 900;
  pointer-events: none;
  text-align: center;
}

.combo-popup.show {
  animation: comboAnim 1s ease forwards;
}

@keyframes comboAnim {
  0% { transform: translate(-50%,-50%) scale(0); opacity:1; }
  20% { transform: translate(-50%,-60%) scale(1.2); opacity:1; }
  70% { transform: translate(-50%,-70%) scale(1); opacity:1; }
  100% { transform: translate(-50%,-90%) scale(0.8); opacity:0; }
}

/* Timer */
.timer-section {
  max-width: 600px;
  margin: 0 auto 10px;
  padding: 0 16px;
}

.timer-track {
  height: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}

.timer-fill {
  height: 100%;
  border-radius: 8px;
  transition: width 1s linear;
  position: relative;
}

.timer-fill::after {
  content: '';
  position: absolute;
  right: 0; top: 0;
  width: 12px; height: 100%;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  filter: blur(3px);
}

.timer-count {
  position: absolute;
  right: 6px; top: -18px;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  color: var(--muted);
}

/* Progress dots */
.progress-row {
  display: flex;
  gap: 5px;
  justify-content: center;
  padding: 0 16px;
  margin: 0 auto 14px;
  max-width: 600px;
}

.pdot {
  flex: 1;
  height: 5px;
  max-width: 40px;
  border-radius: 3px;
  background: rgba(255,255,255,0.07);
  transition: all 0.3s;
}

.pdot.active { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
.pdot.done { background: var(--correct); }
.pdot.fail { background: var(--wrong); }

/* Question card */
.q-wrap {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 16px;
}

.level-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, rgba(255,107,53,0.2), rgba(255,215,0,0.15));
  border: 1px solid rgba(255,107,53,0.3);
  border-radius: 50px;
  padding: 4px 14px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.q-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 24px 20px;
  backdrop-filter: blur(30px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
}

.q-card::before {
  content: '';
  position: absolute;
  top: -1px; left: 20px; right: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent2), transparent);
  opacity: 0.4;
}

.q-text {
  font-size: clamp(1rem, 3vw, 1.2rem);
  font-weight: 600;
  margin-bottom: 18px;
  line-height: 1.5;
}

.q-text small {
  display: block;
  font-size: 0.8rem;
  color: var(--muted);
  font-family: 'Rajdhani', sans-serif;
  margin-top: 3px;
  letter-spacing: 0.5px;
}

/* Pattern */
.pattern-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  padding: 18px;
  background: rgba(0,0,0,0.3);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.05);
  margin-bottom: 14px;
}

.p-item {
  min-width: 50px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  font-size: clamp(1.2rem, 4vw, 1.8rem);
  font-weight: 800;
  font-family: 'Orbitron', sans-serif;
  color: var(--text);
  animation: itemReveal 0.4s ease both;
  position: relative;
}

.p-item:nth-child(1) { animation-delay: 0s; }
.p-item:nth-child(2) { animation-delay: 0.07s; }
.p-item:nth-child(3) { animation-delay: 0.14s; }
.p-item:nth-child(4) { animation-delay: 0.21s; }
.p-item:nth-child(5) { animation-delay: 0.28s; }
.p-item:nth-child(6) { animation-delay: 0.35s; }

@keyframes itemReveal {
  from { opacity:0; transform: translateY(15px) scale(0.8); }
  to { opacity:1; transform: translateY(0) scale(1); }
}

.p-item.is-q {
  background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,107,53,0.1));
  border-color: var(--accent3);
  color: var(--accent3);
  font-size: 1.8rem;
  animation: itemReveal 0.4s 0.35s ease both, qPulse 1.5s 0.8s ease-in-out infinite;
  box-shadow: 0 0 20px rgba(255,215,0,0.2);
}

@keyframes qPulse {
  0%,100% { box-shadow: 0 0 20px rgba(255,215,0,0.2); }
  50% { box-shadow: 0 0 35px rgba(255,215,0,0.5); }
}

.p-item.hi {
  border-color: var(--accent2);
  color: var(--accent2);
  background: rgba(0,229,255,0.08);
}

.p-arrow {
  color: var(--muted);
  font-size: 1rem;
  animation: itemReveal 0.4s ease both;
}

.hint-row {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.85rem;
  color: var(--muted);
  text-align: center;
  margin-bottom: 18px;
  letter-spacing: 0.5px;
}

/* Options */
.opts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.opt {
  position: relative;
  background: rgba(255,255,255,0.03);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 16px 12px;
  font-family: 'Baloo 2', cursive;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  overflow: hidden;
  text-align: center;
}

.opt::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent2);
  opacity: 0;
  transition: opacity 0.2s;
}

.opt:hover:not(:disabled) {
  border-color: var(--accent2);
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(0,229,255,0.2);
}

.opt span { position: relative; z-index: 1; }

.opt.correct {
  background: rgba(0,230,118,0.12);
  border-color: var(--correct);
  color: var(--correct);
  animation: correctBounce 0.5s ease;
}

.opt.wrong {
  background: rgba(255,23,68,0.1);
  border-color: var(--wrong);
  color: var(--wrong);
  animation: wrongShake 0.4s ease;
}

@keyframes correctBounce {
  0%,100% { transform: scale(1); }
  30% { transform: scale(1.08); }
  60% { transform: scale(0.97); }
}

@keyframes wrongShake {
  0%,100% { transform: translateX(0); }
  20%,60% { transform: translateX(-7px); }
  40%,80% { transform: translateX(7px); }
}

/* Feedback */
.feedback {
  text-align: center;
  padding: 12px 16px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 0.95rem;
  display: none;
  margin-top: 10px;
  animation: fadeUp 0.25s ease;
}

.feedback.show { display: block; }
.feedback.ok { background: rgba(0,230,118,0.1); color: var(--correct); border: 1px solid rgba(0,230,118,0.2); }
.feedback.bad { background: rgba(255,23,68,0.08); color: var(--wrong); border: 1px solid rgba(255,23,68,0.2); }

/* Next btn */
.next-btn {
  display: none;
  width: 100%;
  margin-top: 12px;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent2), #0091ea);
  border: none;
  border-radius: 14px;
  font-family: 'Orbitron', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: #000;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.next-btn::after {
  content: '→';
  margin-left: 8px;
}

.next-btn:hover { box-shadow: 0 10px 30px rgba(0,229,255,0.4); transform: translateY(-2px); }
.next-btn.show { display: block; animation: fadeUp 0.3s ease; }

/* ===== GAMEOVER ===== */
#gameover {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

#gameover.show { display: flex; }

.go-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 40px 28px;
  max-width: 500px;
  width: 100%;
  text-align: center;
  backdrop-filter: blur(30px);
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  animation: fadeUp 0.6s ease;
  position: relative;
  overflow: hidden;
}

.go-card::before {
  content: '';
  position: absolute;
  top: -80px; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(0,229,255,0.15), transparent 70%);
  border-radius: 50%;
}

.go-emoji { font-size: 5rem; animation: goBounce 1s ease infinite alternate; display: block; margin-bottom: 12px; }

@keyframes goBounce {
  0% { transform: translateY(0) scale(1); }
  100% { transform: translateY(-14px) scale(1.08); }
}

.go-title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent2), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 20px;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}

.stat-box {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 10px;
}

.stat-box .val {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  display: block;
  line-height: 1;
  margin-bottom: 4px;
}

.stat-box .lbl {
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.rank-badge {
  display: inline-block;
  padding: 8px 24px;
  border-radius: 50px;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 24px;
}

.go-btns { display: flex; gap: 10px; }

.go-btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}

.go-btn.primary {
  background: linear-gradient(135deg, var(--accent2), #0091ea);
  color: #000;
}

.go-btn.primary:hover { box-shadow: 0 8px 25px rgba(0,229,255,0.4); transform: translateY(-2px); }

/* Floating score popup */
.score-pop {
  position: fixed;
  pointer-events: none;
  z-index: 60;
  font-family: 'Orbitron', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  animation: scoreFly 1.2s ease forwards;
}

@keyframes scoreFly {
  0% { transform: translateY(0) scale(0.5); opacity: 1; }
  100% { transform: translateY(-100px) scale(1.1); opacity: 0; }
}

/* Screen flash */
.flash-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 40;
  opacity: 0;
}

.flash-overlay.correct-flash {
  background: radial-gradient(circle, rgba(0,230,118,0.15), transparent 60%);
  animation: flash 0.4s ease;
}

.flash-overlay.wrong-flash {
  background: radial-gradient(circle, rgba(255,23,68,0.15), transparent 60%);
  animation: flash 0.4s ease;
}

@keyframes flash { 0%,100%{opacity:0} 30%{opacity:1} }

/* Screen shake */
@keyframes screenShake {
  0%,100% { transform: translate(0,0); }
  10% { transform: translate(-6px, -3px); }
  30% { transform: translate(6px, 3px); }
  50% { transform: translate(-4px, 5px); }
  70% { transform: translate(4px, -4px); }
  90% { transform: translate(-2px, 2px); }
}

.shake { animation: screenShake 0.4s ease; }

/* Misc */
@keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
@keyframes fadeDown { from { opacity:0; transform: translateY(-20px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- Cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>

<!-- Canvas backgrounds -->
<canvas id="starfield"></canvas>
<canvas id="particles"></canvas>

<!-- Flash overlay -->
<div class="flash-overlay" id="flash"></div>

<!-- Combo popup -->

<script>
// ===== STARFIELD =====
(function(){
  const c = document.getElementById('starfield');
  const ctx = c.getContext('2d');
  let stars = [];

  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    stars = Array.from({length: 180}, () => ({
      x: Math.random() * c.width,
      y: Math.random() * c.height,
      r: Math.random() * 1.5,
      speed: 0.05 + Math.random() * 0.15,
      alpha: 0.1 + Math.random() * 0.6
    }));
  }

  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(180,200,255,${s.alpha})`;
      ctx.fill();
      s.y += s.speed;
      if (s.y > c.height) { s.y = 0; s.x = Math.random() * c.width; }
    });
    requestAnimationFrame(draw);
  }
  resize();
  window.addEventListener('resize', resize);
  draw();
})();

// ===== PARTICLES =====
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
let particleList = [];

function resizeP() { pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight; }
resizeP();
window.addEventListener('resize', resizeP);

function spawnParticles(x, y, color, count=20) {
  for (let i = 0; i < count; i++) {
    particleList.push({
      x, y,
      vx: (Math.random()-0.5)*8,
      vy: (Math.random()-0.5)*8 - 2,
      r: 2 + Math.random()*4,
      color,
      alpha: 1,
      decay: 0.03 + Math.random()*0.03
    });
  }
}

function drawParticles() {
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particleList = particleList.filter(p => p.alpha > 0);
  particleList.forEach(p => {
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    pCtx.fillStyle = p.color + Math.floor(p.alpha*255).toString(16).padStart(2,'0');
    pCtx.fill();
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.2;
    p.alpha -= p.decay;
  });
  requestAnimationFrame(drawParticles);
}
drawParticles();

// ===== CUSTOM CURSOR =====
const cursor = document.getElementById('cursor');
const cursorDot = document.getElementById('cursorDot');
let cx=0, cy=0;
document.addEventListener('mousemove', e => {
  cx = e.clientX; cy = e.clientY;
  cursorDot.style.left = (cx-2.5)+'px';
  cursorDot.style.top = (cy-2.5)+'px';
  cursor.style.left = (cx-9)+'px';
  cursor.style.top = (cy-9)+'px';
});

// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function playSound(type) {
  try {
    if (!audioCtx) audioCtx = new AudioCtx();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'correct') {
      osc.frequency.setValueAtTime(523, audioCtx.currentTime);
      osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    } else if (type === 'wrong') {
      osc.frequency.setValueAtTime(220, audioCtx.currentTime);
      osc.frequency.setValueAtTime(180, audioCtx.currentTime + 0.15);
      osc.type = 'sawtooth';
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'combo') {
      [0,0.08,0.16].forEach((t,i) => {
        const o2 = audioCtx.createOscillator();
        const g2 = audioCtx.createGain();
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.frequency.value = [659, 784, 1047][i];
        g2.gain.setValueAtTime(0.2, audioCtx.currentTime+t);
        g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+t+0.3);
        o2.start(audioCtx.currentTime+t); o2.stop(audioCtx.currentTime+t+0.3);
      });
    } else if (type === 'tick') {
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.05);
      osc.start(); osc.stop(audioCtx.currentTime+0.05);
    }
  } catch(e){}
}

// ===== QUESTIONS =====
const QUESTIONS = [
  { hi:'अगला नंबर क्या है?', en:'What comes next?', pat:[2,4,6,8,'?'], ans:10, opts:[9,10,12,11], hint:'हर बार +2 · Each time +2', lv:1 },
  { hi:'क्रम जारी रखो!', en:'Continue the series!', pat:[3,6,9,12,'?'], ans:15, opts:[13,14,15,18], hint:'पहाड़ा 3 · Table of 3', lv:1 },
  { hi:'अगला नंबर बताओ!', en:'Find the next number!', pat:[1,4,9,16,'?'], ans:25, opts:[20,22,25,30], hint:'वर्ग संख्याएँ · Square numbers', lv:2 },
  { hi:'Fibonacci क्रम!', en:'Fibonacci sequence!', pat:[1,1,2,3,5,'?'], ans:8, opts:[6,7,8,9], hint:'दो पिछले जोड़ो · Add previous two', lv:2 },
  { hi:'गायब नंबर ढूंढो!', en:'Find the missing!', pat:[100,90,81,73,'?'], ans:66, opts:[64,65,66,68], hint:'घटाव: 10,9,8... · Subtract 10,9,8...', lv:3 },
  { hi:'गुणा क्रम!', en:'Multiplication series!', pat:[2,6,18,54,'?'], ans:162, opts:[108,144,162,180], hint:'×3 हर बार · Multiply by 3', lv:3 },
  { hi:'अगला क्या आएगा?', en:'What comes next?', pat:['🔴','🔵','🔴','🔵','?'], ans:'🔴', opts:['🔵','🔴','🟡','🟢'], hint:'रंग बदलता है · Colors alternate', lv:1 },
  { hi:'पैटर्न पहचानो!', en:'Identify pattern!', pat:['⭐','⭐','🌙','⭐','⭐','?'], ans:'🌙', opts:['⭐','🌙','☀️','🌟'], hint:'2 स्टार 1 चाँद · 2 stars 1 moon', lv:1 },
  { hi:'क्रम पूरा करो!', en:'Complete the pattern!', pat:['🔺','🔷','🔺','🔷','🔺','?'], ans:'🔷', opts:['🔺','🔷','🔹','🔻'], hint:'बारी-बारी · Alternate shapes', lv:1 },
  { hi:'अगला क्या होगा?', en:'Next in sequence?', pat:[5,10,20,40,'?'], ans:80, opts:[60,70,80,100], hint:'×2 हर बार · Double each time', lv:2 },
  { hi:'नंबर ढूंढो!', en:'Find the number!', pat:[7,14,21,28,'?'], ans:35, opts:[30,33,35,36], hint:'पहाड़ा 7 · Table of 7', lv:1 },
  { hi:'उच्च स्तर पैटर्न!', en:'Advanced pattern!', pat:[0,3,8,15,'?'], ans:24, opts:[20,22,24,26], hint:'n²-1 · Formula: n²-1', lv:3 },
  { hi:'क्रम जारी रखो!', en:'Continue!', pat:['1️⃣','2️⃣','3️⃣','1️⃣','2️⃣','?'], ans:'3️⃣', opts:['1️⃣','2️⃣','3️⃣','4️⃣'], hint:'1,2,3 बार-बार · 1,2,3 repeat', lv:1 },
  { hi:'घटाव पैटर्न!', en:'Subtraction pattern!', pat:[50,44,39,35,'?'], ans:32, opts:[30,31,32,33], hint:'घटाव: 6,5,4,3... · Subtract 6,5,4,3...', lv:3 },
  { hi:'Powers of 2!', en:'Powers of 2!', pat:[1,2,4,8,16,'?'], ans:32, opts:[24,28,32,36], hint:'2 की घात · Powers of 2', lv:2 },
];

// State
let questions=[], cur=0, score=0, streak=0, bestStreak=0, combo=1, maxCombo=1;
let correctCt=0, timer=null, timeLeft=15, answered=false;

function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }

function startGame(){
  questions = shuffle(QUESTIONS).slice(0,10);
  cur=0; score=0; streak=0; bestStreak=0; combo=1; maxCombo=1; correctCt=0;

  document.getElementById('intro-screen').style.display='none';
  document.getElementById('gameover').classList.remove('show');
  document.getElementById('main-game').classList.add('show');

  buildStreak(); buildProgress();
  loadQ();
}

function buildStreak(){
  const d = document.getElementById('streak-dots');
  d.innerHTML='';
  for(let i=0;i<5;i++){
    const dot=document.createElement('div');
    dot.className='streak-dot';
    dot.id='sd-'+i;
    d.appendChild(dot);
  }
}

function buildProgress(){
  const r = document.getElementById('progress-row');
  r.innerHTML='';
  questions.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='pdot'+(i===0?' active':'');
    d.id='pd-'+i;
    r.appendChild(d);
  });
}

function loadQ(){
  answered=false;
  const q=questions[cur];

  document.getElementById('hud-q').textContent=`${cur+1}/${questions.length}`;
  document.getElementById('hud-lvl').textContent=q.lv;
  document.getElementById('hud-combo').textContent=`x${combo}`;
  document.getElementById('level-tag').textContent=`${'⭐'.repeat(q.lv)} स्तर ${q.lv} · Level ${q.lv}`;
  document.getElementById('q-text').innerHTML=`${q.hi}<small>${q.en}</small>`;
  document.getElementById('hint-row').textContent='💡 '+q.hint;
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').className='next-btn';

  // Pattern
  const pr=document.getElementById('pattern-row');
  pr.innerHTML='';
  const pat = q.pat;
  pat.forEach((item,i)=>{
    if(i>0 && typeof item==='number'){
      const arr=document.createElement('span');
      arr.className='p-arrow'; arr.textContent='→';
      pr.appendChild(arr);
    }
    const div=document.createElement('div');
    if(item==='?'){
      div.className='p-item is-q'; div.textContent='?';
    } else if(i===pat.length-2 && typeof item==='number'){
      div.className='p-item hi'; div.textContent=item;
    } else {
      div.className='p-item'; div.textContent=item;
    }
    pr.appendChild(div);
  });

  // Options
  const og=document.getElementById('opts');
  og.innerHTML='';
  shuffle(q.opts).forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span>${opt}</span>`;
    btn.onclick=()=>checkAns(opt, btn);
    og.appendChild(btn);
  });

  startTimer();
  updateProgress();
}

function startTimer(){
  clearInterval(timer);
  timeLeft=15;
  const fill=document.getElementById('timer-fill');
  const cnt=document.getElementById('timer-count');
  fill.style.width='100%';
  fill.style.background='linear-gradient(90deg, var(--accent2), var(--accent1))';
  cnt.textContent=15;

  timer=setInterval(()=>{
    timeLeft--;
    cnt.textContent=timeLeft;
    const pct=(timeLeft/15)*100;
    fill.style.width=pct+'%';
    if(pct<40) fill.style.background='linear-gradient(90deg, var(--wrong), #ff6b00)';
    if(timeLeft<=3 && timeLeft>0) playSound('tick');
    if(timeLeft<=0){ clearInterval(timer); if(!answered) timeUp(); }
  },1000);
}

function timeUp(){
  answered=true;
  streak=0; combo=1;
  updateStreakUI();
  document.getElementById('hud-combo').textContent='x1';
  const q=questions[cur];
  document.getElementById('feedback').className='feedback bad show';
  document.getElementById('feedback').innerHTML=`⏰ समय खत्म! Time's Up! &nbsp; ✅ <strong>${q.ans}</strong>`;
  document.getElementById('pd-'+cur).className='pdot fail';
  document.getElementById('next-btn').className='next-btn show';
  triggerFlash('wrong');
}

function checkAns(sel, btn){
  if(answered) return;
  answered=true;
  clearInterval(timer);
  const q=questions[cur];
  const ok=String(sel)===String(q.ans);

  if(ok){
    btn.className='opt correct';
    streak++; correctCt++;
    if(streak>bestStreak) bestStreak=streak;
    if(streak>=3){ combo=Math.min(combo+1,5); }
    if(combo>maxCombo) maxCombo=combo;

    const base=q.lv*10 + Math.max(0,timeLeft)*2;
    const pts=base*combo;
    score+=pts;

    document.getElementById('hud-score').textContent=score;
    document.getElementById('hud-combo').textContent=`x${combo}`;

    // Score popup
    spawnScorePopup('+'+pts, btn, '#00e676');
    spawnParticles(cx||window.innerWidth/2, cy||200, '#00e676', 25);
    triggerFlash('correct');
    playSound(combo>=3?'combo':'correct');

    if(combo>=2){
      showComboPop(`x${combo} COMBO!`, combo>=4?'#ffd700':combo>=3?'#ff6b35':'#00e5ff');
    }

    updateStreakUI();
    document.getElementById('feedback').className='feedback ok show';
    document.getElementById('feedback').innerHTML=`✅ बिल्कुल सही! Correct! &nbsp;<strong>+${pts}</strong> ${combo>1?`(×${combo} Combo!)` : ''}`;
    document.getElementById('pd-'+cur).className='pdot done';
  } else {
    btn.className='opt wrong';
    streak=0; combo=1;
    document.getElementById('hud-combo').textContent='x1';
    updateStreakUI();
    document.querySelectorAll('.opt').forEach(b=>{
      if(String(b.querySelector('span').textContent)===String(q.ans)) b.className='opt correct';
    });
    spawnParticles(cx||window.innerWidth/2, cy||200, '#ff1744', 15);
    triggerFlash('wrong');
    playSound('wrong');
    document.body.classList.remove('shake');
    void document.body.offsetWidth;
    document.body.classList.add('shake');
    setTimeout(()=>document.body.classList.remove('shake'),400);

    document.getElementById('feedback').className='feedback bad show';
    document.getElementById('feedback').innerHTML=`❌ गलत! Wrong! &nbsp; ✅ सही था: <strong>${q.ans}</strong>`;
    document.getElementById('pd-'+cur).className='pdot fail';
  }

  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  document.getElementById('next-btn').className='next-btn show';
}

function updateStreakUI(){
  for(let i=0;i<5;i++){
    const d=document.getElementById('sd-'+i);
    if(d) d.className='streak-dot'+(i<streak?' lit':'');
  }
  const fire=document.getElementById('streak-fire');
  if(fire) fire.className='streak-fire'+(streak>=3?' show':'');
}

function updateProgress(){
  for(let i=0;i<questions.length;i++){
    const d=document.getElementById('pd-'+i);
    if(!d) continue;
    if(i===cur && !d.classList.contains('done') && !d.classList.contains('fail'))
      d.className='pdot active';
  }
}

function showComboPop(text, color){
  const el=document.getElementById('comboPop');
  el.textContent=text;
  el.style.color=color;
  el.style.textShadow=`0 0 30px ${color}`;
  el.className='combo-popup';
  void el.offsetWidth;
  el.className='combo-popup show';
  setTimeout(()=>el.className='combo-popup',1000);
}

function spawnScorePopup(text, btn, color){
  const rect=btn.getBoundingClientRect();
  const el=document.createElement('div');
  el.className='score-pop';
  el.textContent=text;
  el.style.color=color;
  el.style.left=(rect.left+rect.width/2)+'px';
  el.style.top=(rect.top)+'px';
  el.style.textShadow=`0 0 20px ${color}`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

function triggerFlash(type){
  const el=document.getElementById('flash');
  el.className='flash-overlay';
  void el.offsetWidth;
  el.className='flash-overlay '+(type==='correct'?'correct-flash':'wrong-flash');
  setTimeout(()=>el.className='flash-overlay',400);
}

function nextQ(){
  cur++;
  if(cur>=questions.length) endGame();
  else loadQ();
}

function endGame(){
  clearInterval(timer);
  document.getElementById('main-game').classList.remove('show');

  const pct=Math.round((correctCt/questions.length)*100);
  let emoji='😔',title='Phir Koshish Karo!',rank='',rankColor='';
  if(pct>=90){ emoji='🏆'; title='LEGENDARY!'; rank='🥇 LEGEND RANK'; rankColor='linear-gradient(135deg,#ffd700,#ff9500)'; }
  else if(pct>=70){ emoji='🎉'; title='SHANDAAR!'; rank='🥈 MASTER RANK'; rankColor='linear-gradient(135deg,#00e5ff,#0091ea)'; }
  else if(pct>=50){ emoji='👍'; title='ACCHA KIYA!'; rank='🥉 SKILLED RANK'; rankColor='linear-gradient(135deg,#bf5fff,#7b1fa2)'; }
  else { emoji='💪'; title='AAGE BADHO!'; rank='🔰 BEGINNER RANK'; rankColor='linear-gradient(135deg,#6060a0,#404080)'; }

  document.getElementById('go-emoji').textContent=emoji;
  document.getElementById('go-title').textContent=title;
  const rb=document.getElementById('rank-badge');
  rb.textContent=rank; rb.style.background=rankColor; rb.style.color='#000';
  document.getElementById('gs-score').textContent=score;
  document.getElementById('gs-correct').textContent=`${correctCt}/${questions.length}`;
  document.getElementById('gs-streak').textContent=bestStreak;
  document.getElementById('gs-combo').textContent='x'+maxCombo;

  document.getElementById('gameover').classList.add('show');
  spawnParticles(window.innerWidth/2, window.innerHeight/2, pct>=70?'#ffd700':'#6060a0', 60);
}
</script>
</body>
</html>
