<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔍 Odd One Out · दिमाग तेज़ करो</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Baloo+2:wght@400;600;800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.odd-grid{display:grid;gap:8px;padding:0 14px;max-width:500px;margin:0 auto;}
.odd-item{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 10px;font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:700;color:var(--text);cursor:pointer;transition:all .2s;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;}
.odd-item:active:not(:disabled){transform:scale(.97);}
.odd-item.correct{background:rgba(0,230,118,.12);border-color:var(--c5);color:var(--c5);}
.odd-item.wrong{background:rgba(255,23,68,.1);border-color:var(--c6);color:var(--c6);}
.category-hint{font-family:'Rajdhani',sans-serif;font-size:.85rem;color:var(--muted);text-align:center;padding:0 14px 10px;max-width:500px;margin:0 auto;}
</style>
</head>
<body>
<canvas id="bgc"></canvas><canvas id="fxc"></canvas>
<div class="flash" id="fl"></div>
<div class="app">
  <div class="game-top">
    <button class="back-btn" onclick="confirmQuit()">✕</button>
    <div class="game-top-center">
      <div class="game-top-title" style="color:var(--c1)">🔍 ODD ONE OUT</div>
      <div class="game-top-sub" id="gt-sub">Level 1 · Task 1/10</div>
    </div>
    <div class="game-top-score" id="gt-score">0</div>
  </div>
  <div class="hud">
    <div class="hp"><div class="hp-val" style="color:var(--c1)" id="g-score">0</div><div class="hp-lbl">Score</div></div>
    <div class="hp"><div class="hp-val" style="color:var(--c2)" id="g-task">1/10</div><div class="hp-lbl">Task</div></div>
    <div class="hp"><div class="hp-val" style="color:var(--c3)" id="g-combo">x1</div><div class="hp-lbl">Combo</div></div>
    <div class="hp"><div class="hp-val" style="color:var(--c5)" id="g-lives">❤️❤️❤️</div><div class="hp-lbl">Lives</div></div>
  </div>
  <div class="task-prog"><div class="task-dots" id="task-dots"></div></div>
  <div class="tmr-wrap"><div class="tmr-track"><div class="tmr-fill" id="tmr-fill" style="width:100%"></div></div></div>
  <div class="q-area" id="q-area"></div>
</div>
<div class="overlay-screen" id="s-lvl-done">
  <div class="ld-card"><span class="ld-emoji" id="ld-emoji">🏆</span><div class="stars-row" id="ld-stars">⭐⭐⭐</div><div class="ld-title" id="ld-title">Level Complete!</div><div class="ld-stats" id="ld-stats"></div><div class="ld-btns"><button class="ld-btn p" id="ld-next-btn">Next Level →</button><a class="ld-btn s" href="levels.html?game=oddone">📋 Levels</a></div></div>
</div>
<div class="overlay-screen" id="s-lvl-fail">
  <div class="lf-card"><div style="font-size:3.5rem;margin-bottom:10px">💔</div><div class="lf-title" id="lf-title">Level Failed!</div><div class="lf-sub" id="lf-sub">Phir se koshish karo!</div><div style="background:rgba(255,255,255,.04);border-radius:12px;padding:14px;margin:14px 0;font-family:'Rajdhani',sans-serif;font-size:.9rem;color:var(--muted)" id="lf-stats"></div><div class="lf-btns"><button class="lf-btn retry" onclick="retryLevel()">🔄 Retry Level</button><a class="lf-btn home" href="levels.html?game=oddone">📋 Levels</a></div></div>
</div>
<script src="engine.js"></script>
<script>
const ODD_BANK=[
  // Animals
  {items:['🐶 कुत्ता','🐱 बिल्ली','🐭 चूहा','🍎 सेब'],odd:'🍎 सेब',hint:'जानवर नहीं है',zone:1},
  {items:['🦁 शेर','🐯 बाघ','🐻 भालू','🐟 मछली'],odd:'🐟 मछली',hint:'जल-जीव है',zone:1},
  {items:['🍎 सेब','🍌 केला','🍇 अंगूर','🥕 गाजर'],odd:'🥕 गाजर',hint:'सब्ज़ी है, फल नहीं',zone:1},
  {items:['सोमवार','मंगलवार','जनवरी','बुधवार'],odd:'जनवरी',hint:'महीना है, दिन नहीं',zone:1},
  {items:['2','4','6','7'],odd:'7',hint:'विषम संख्या',zone:1},
  {items:['🚗 गाड़ी','✈️ हवाई जहाज़','🚢 जहाज़','🏠 घर'],odd:'🏠 घर',hint:'यातायात नहीं है',zone:1},
  {items:['लाल','नीला','गोल','हरा'],odd:'गोल',hint:'रंग नहीं है',zone:1},
  {items:['गुलाब','चमेली','कमल','नीम'],odd:'नीम',hint:'फूल नहीं है',zone:1},
  {items:['3','9','15','14'],odd:'14',hint:'3 का गुणज नहीं',zone:1},
  {items:['दिल्ली','मुंबई','लंदन','चेन्नई'],odd:'लंदन',hint:'भारत का शहर नहीं',zone:1},
  // Zone 2
  {items:['Python','Java','HTML','C++'],odd:'HTML',hint:'Programming language नहीं',zone:2},
  {items:['Jupiter','Mars','Moon','Saturn'],odd:'Moon',hint:'Planet नहीं है',zone:2},
  {items:['1','4','9','15'],odd:'15',hint:'Perfect square नहीं',zone:2},
  {items:['हिंदी','अंग्रेज़ी','बंगाली','लिखना'],odd:'लिखना',hint:'भाषा नहीं है',zone:2},
  {items:['ताजमहल','क़ुतुब मीनार','एफिल टावर','लाल क़िला'],odd:'एफिल टावर',hint:'भारत में नहीं है',zone:2},
  {items:['2','3','5','9'],odd:'9',hint:'Prime number नहीं',zone:2},
  {items:['🎸 गिटार','🎺 तुरही','🎻 वायलिन','🥁 ढोल'],odd:'🥁 ढोल',hint:'तार वाला नहीं है',zone:2},
  {items:['वर्ग','आयत','त्रिभुज','गोला'],odd:'गोला',hint:'2D आकार नहीं',zone:2},
  {items:['H2O','CO2','NaCl','HTML'],odd:'HTML',hint:'रासायनिक यौगिक नहीं',zone:2},
  {items:['डॉक्टर','इंजीनियर','किसान','अस्पताल'],odd:'अस्पताल',hint:'पेशा नहीं है',zone:2},
  // Zone 3
  {items:['Vertebrate','Invertebrate','Mammal','Algebra'],odd:'Algebra',hint:'Biology term नहीं',zone:3},
  {items:['Sodium','Potassium','Calcium','Gravity'],odd:'Gravity',hint:'Element नहीं है',zone:3},
  {items:['12','18','24','30','35'],odd:'35',hint:'6 का गुणज नहीं',zone:3},
  {items:['Shakespeare','Kalidas','Newton','Tagore'],odd:'Newton',hint:'Scientist है, कवि नहीं',zone:3},
  {items:['Rhombus','Pentagon','Sphere','Hexagon'],odd:'Sphere',hint:'3D shape है',zone:3},
  {items:['Herbivore','Carnivore','Omnivore','Igneous'],odd:'Igneous',hint:'Rock type है, diet नहीं',zone:3},
  {items:['RAM','ROM','CPU','HTML'],odd:'HTML',hint:'Hardware नहीं है',zone:3},
  {items:['Photosynthesis','Respiration','Digestion','Rotation'],odd:'Rotation',hint:'Biological process नहीं',zone:3},
  {items:['13','17','19','21'],odd:'21',hint:'Prime number नहीं (3×7)',zone:3},
  {items:['Amazon','Nile','Ganges','Everest'],odd:'Everest',hint:'नदी नहीं है',zone:3},
  // Zone 4
  {items:['Mitosis','Meiosis','Osmosis','Photosynthesis'],odd:'Osmosis',hint:'Cell division नहीं',zone:4},
  {items:['Iron','Copper','Mercury','Diamond'],odd:'Diamond',hint:'Metal नहीं है',zone:4},
  {items:['Obtuse','Acute','Reflex','Parallel'],odd:'Parallel',hint:'Angle type नहीं',zone:4},
  {items:['IPv4','IPv6','HTTP','TCP'],odd:'HTTP',hint:'IP protocol नहीं',zone:4},
  {items:['Haiku','Sonnet','Novel','Limerick'],odd:'Novel',hint:'Poem format नहीं',zone:4},
  {items:['Logarithm','Derivative','Integral','Synonym'],odd:'Synonym',hint:'Math term नहीं',zone:4},
  {items:['Proton','Neutron','Electron','Photon'],odd:'Photon',hint:'Subatomic particle नहीं (massless)',zone:4},
  {items:['Baroque','Renaissance','Impressionism','Algorithm'],odd:'Algorithm',hint:'Art movement नहीं',zone:4},
  {items:['64','81','100','144','150'],odd:'150',hint:'Perfect square नहीं',zone:4},
  {items:['Syntax','Semantics','Pragmatics','Calculus'],odd:'Calculus',hint:'Linguistics नहीं',zone:4},
  // Zone 5
  {items:['Riemann','Fermat','Euclid','Beethoven'],odd:'Beethoven',hint:'Mathematician नहीं',zone:5},
  {items:['Quark','Lepton','Boson','Proton'],odd:'Proton',hint:'Elementary particle नहीं (composite)',zone:5},
  {items:['NP-Hard','NP-Complete','P-Class','Baroque'],odd:'Baroque',hint:'Complexity class नहीं',zone:5},
  {items:['Hegemony','Epistemology','Ontology','Mitosis'],odd:'Mitosis',hint:'Philosophy term नहीं',zone:5},
  {items:['Planck','Boltzmann','Newton','Fibonacci'],odd:'Fibonacci',hint:'Physics constant name नहीं',zone:5},
  {items:['Genome','Proteome','Transcriptome','Algorithm'],odd:'Algorithm',hint:'Biology -ome नहीं',zone:5},
  {items:['Iambic','Trochaic','Dactylic','Ionic'],odd:'Ionic',hint:'Metrical foot नहीं (bond type)',zone:5},
  {items:['Kant','Hegel','Aristotle','Euler'],odd:'Euler',hint:'Philosopher नहीं (mathematician)',zone:5},
  {items:['1024','2048','4096','6144'],odd:'6144',hint:'2 की घात नहीं',zone:5},
  {items:['Syntax error','Runtime error','Logical error','Spelling error'],odd:'Spelling error',hint:'Programming error type नहीं',zone:5},
];

function getZoneItems(zone){return ODD_BANK.filter(r=>r.zone===zone);}
function genTask(lv,ti){
  const d=getDiff(lv);
  const pool=getZoneItems(d.zone);
  const idx=(lv*7+ti*3)%pool.length;
  const q=pool[idx];
  return{items:shuffle(q.items),odd:q.odd,hint:q.hint,time:Math.round(20*d.timeScale)};
}
function genTasks(lv){return Array.from({length:10},(_,i)=>genTask(lv,i));}

function loadTask(){
  clearTmr();CG.answered=false;
  const task=CG.tasks[CG.task];
  updSubtitle();document.getElementById('g-combo').textContent='x'+CG.combo;document.getElementById('g-task').textContent=`${CG.task+1}/10`;updLives();
  for(let i=0;i<10;i++){if(!CG.taskResults[i])document.getElementById('td'+i).className='tdot'+(i===CG.task?' cur':'');}
  const qa=document.getElementById('q-area');qa.innerHTML='';
  const card=document.createElement('div');card.className='q-card';
  card.innerHTML=`<div class="q-main">अलग वाला ढूंढो!<small>Find the Odd One Out!</small></div>`;qa.appendChild(card);
  const hint=document.createElement('div');hint.className='category-hint';hint.textContent='💡 '+task.hint;qa.appendChild(hint);
  const grid=document.createElement('div');grid.className='odd-grid';
  grid.style.gridTemplateColumns=task.items.length<=4?'1fr 1fr':'1fr 1fr';
  task.items.forEach(item=>{
    const btn=document.createElement('div');btn.className='odd-item';btn.textContent=item;
    btn.onclick=()=>{
      if(CG.answered)return;
      const isOdd=item===task.odd;
      checkAnswer(isOdd,null,task.odd,isOdd?null:`Sahi tha: ${task.odd}`,nextTask);
      btn.className='odd-item '+(isOdd?'correct':'wrong');
      if(!isOdd)grid.querySelectorAll('.odd-item').forEach(b=>{if(b.textContent===task.odd)b.className='odd-item correct';});
      grid.querySelectorAll('.odd-item').forEach(b=>b.style.pointerEvents='none');
    };
    grid.appendChild(btn);
  });
  qa.appendChild(grid);
  qa.appendChild(buildFbNext(nextTask));
  startTmr(task.time,()=>timeUp(task.odd,nextTask));
}
function nextTask(){CG.task++;if(CG.task>=10){levelComplete();return;}loadTask();}
const level=parseInt(getQueryParam('level'))||1;
initGameState('oddone',level);CG.tasks=genTasks(level);buildTaskDots();loadTask();
</script>
</body>
</html>
